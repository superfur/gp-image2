name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete old release if exists
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${env:GITHUB_REF}".Replace("refs/tags/", "")
          Write-Host "Checking existing release for tag: $tag"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Deleting existing release and tag: $tag"
            gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag
          } else {
            Write-Host "No existing release found for tag: $tag"
          }
          exit 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller gpt_image2_qt.spec --noconfirm

      - name: Compress build output
        run: powershell Compress-Archive -Path "dist/gpt-image-2-studio" -DestinationPath "gpt-image-2-studio-win.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gpt-image-2-studio-win.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
