appId: com.gptimage2.studio
productName: gpt-image-2 Studio

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-win.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-mac.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: ${productName}-${version}-linux.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
